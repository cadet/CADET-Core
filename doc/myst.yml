version: 1
project:
  id: cadet-core-docs
  title: CADET-Core
  description: Fast and accurate solver for a comprehensive model family
  github: https://github.com/cadet/cadet-core
  bibliography: literature.bib
  substitutions:
    component_li: "$c^\\ell_i$ concentration of component $i$ in the liquid phase."
    component_sij: "$c^s_{j,i,m_{j,i}}$ concentration of component $i$ in the solid phase of particle type $j$ and bound state $m_{j,i}$."
    flow_in_out: "$F_{\\text{in}}$ and $F_{\\text{out}}$ flow rates of liquid into and out of the tank."
    reaction: "$f_{\\text{react},i}^l\\left( c^\\ell \\right)$ and $f_{\\text{react},j,i}^s\\left( c^\\ell, c_j^s \\right)$ reaction rates of component $i$ in the liquid and solid phase."
    reaction_ads: "$f_{\\text{ads},j}\\left( c^\\ell, c^s_j\\right)$ adsorption rate of component $i$ in the solid phase of particle type $j$."
    volume_fac_pat: "$d_j$ volume fraction of the different solid volume in the tank."
    volume_liquid: "$V^{\\ell}$ liquid volume in the tank."
    volume_solid: "$V^{s}$ solid volume in the tank."
